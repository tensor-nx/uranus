<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#F7F7F7;font-family:var(--font-sans, 'Geist', sans-serif);color:#171717;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:28px;align-items:center;flex-wrap:wrap}
  .label{width:84px;flex-shrink:0;
    font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:10px;line-height:14px;font-weight:500;letter-spacing:0.04em;
    color:#A3A3A3;text-transform:uppercase}

  /* ---------- Checkbox ---------- */
  .cb{display:inline-flex;align-items:center;gap:7px;font-size:13px;line-height:1;font-weight:400;color:#171717;letter-spacing:-0.006em;cursor:pointer}
  .cb .box{width:14px;height:14px;border:1px solid #C5C5C5;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;background:#fff;transition:all .12s;box-shadow:inset 0 1px 0 rgba(23,23,23,0.02);flex-shrink:0}
  .cb:hover .box{border-color:#A3A3A3}
  .cb.on .box{background:#171717;border-color:#171717;box-shadow:none}
  .cb.on .box svg{width:10px;height:10px;color:#fff;stroke-width:2.5;display:block}

  /* ---------- Radio ---------- */
  .rd{display:inline-flex;align-items:center;gap:7px;font-size:13px;line-height:1;font-weight:400;color:#171717;letter-spacing:-0.006em;cursor:pointer}
  .rd .dot{width:16px;height:16px;border:1px solid #C5C5C5;border-radius:999px;background:#fff;transition:all .12s;box-shadow:inset 0 1px 0 rgba(23,23,23,0.02);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box}
  .rd:hover .dot{border-color:#A3A3A3}
  .rd.on .dot{border-color:#171717;box-shadow:none}
  .rd.on .dot i{width:8px;height:8px;background:#171717;border-radius:999px;display:block}

  /* ---------- Toggle ---------- */
  .tg-group{display:inline-flex;align-items:center;gap:8px;font-size:13px;line-height:1;font-weight:400;color:#171717;letter-spacing:-0.006em;cursor:pointer}
  .tg{width:30px;height:18px;border-radius:999px;background:#D1D1D1;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(23,23,23,0.04)}
  .tg::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:999px;transition:left .15s;box-shadow:0 1px 2px rgba(23,23,23,0.16), 0 0 0 0.5px rgba(23,23,23,0.04)}
  .tg.on{background:#171717}
  .tg.on::after{left:14px}

  /* ---------- Segmented ---------- */
  .seg{display:inline-flex;padding:2px;background:#EDEDED;border-radius:8px;gap:0}
  .seg button{border:0;background:transparent;height:26px;padding:0 12px;border-radius:6px;
    font-family:inherit;font-size:12px;line-height:1;font-weight:500;color:#5C5C5C;letter-spacing:-0.006em;cursor:pointer;
    transition:color .12s}
  .seg button:hover{color:#171717}
  .seg button.on{background:#fff;color:#171717;
    box-shadow:0 1px 2px rgba(23,23,23,0.06), 0 0 0 0.5px rgba(23,23,23,0.06)}
</style></head><body>

  <div class="row">
    <div class="label">Checkbox</div>
    <div class="cb on">
      <span class="box"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.2 L5 8.5 L9.5 3.5"/></svg></span>
      Auto-promote stable drafts
    </div>
    <div class="cb"><span class="box"></span>Notify watchers</div>
  </div>

  <div class="row">
    <div class="label">Radio</div>
    <div class="rd on"><span class="dot"><i></i></span>Private</div>
    <div class="rd"><span class="dot"></span>Team</div>
    <div class="rd"><span class="dot"></span>Workspace</div>
  </div>

  <div class="row">
    <div class="label">Toggle</div>
    <label class="tg-group"><span class="tg on"></span>Dark mode</label>
    <label class="tg-group"><span class="tg"></span>Beta features</label>
  </div>

  <div class="row">
    <div class="label">Segmented</div>
    <div class="seg"><button class="on">Map</button><button>Outline</button><button>Transcript</button></div>
  </div>

</body></html>
