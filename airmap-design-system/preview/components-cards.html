<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#F7F7F7;display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--font-sans)}
  .card{background:#fff;border:1px solid #EBEBEB;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
  .card:hover{box-shadow:0 2px 4px rgba(23,23,23,0.04)}
  .head{display:flex;align-items:center;justify-content:space-between}
  .title{font:500 16px/24px var(--font-sans);color:#171717}
  .meta{font:400 12px/16px var(--font-sans);color:#7B7B7B}
  .desc{font:400 14px/20px var(--font-sans);color:#5C5C5C}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .badge{font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;font-weight:500;font-size:11px;line-height:14px;letter-spacing:0.02em;font-variant-ligatures:none;color:#5C5C5C;background:#F5F5F5;padding:3px 8px;border-radius:4px}
  .av{display:flex}
  .av span{width:20px;height:20px;border-radius:9999px;background:#EBEBEB;border:1.5px solid #fff;margin-left:-4px;display:inline-flex;align-items:center;justify-content:center;font:500 9px/1 var(--font-sans);color:#5C5C5C}
  .av span:first-child{margin-left:0}
</style></head><body>
  <div class="card">
    <div class="head"><div class="title">Q3 positioning</div><div class="meta">2h ago</div></div>
    <div class="desc">Working through how to talk about Airmap vs. the open-ended chat category.</div>
    <div class="foot"><span class="badge">STRATEGY · v7</span><div class="av"><span>KR</span><span>JM</span><span>+3</span></div></div>
  </div>
  <div class="card">
    <div class="head"><div class="title">Research synthesis</div><div class="meta">yesterday</div></div>
    <div class="desc">17 user interviews, grouped by persona. Ready to promote the top 3 themes.</div>
    <div class="foot"><span class="badge">RESEARCH · v3</span><div class="av"><span>AL</span></div></div>
  </div>
</body></html>
