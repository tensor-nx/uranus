<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#F7F7F7;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;border-radius:12px}
  .cell.light{background:#fff;border:1px solid #EBEBEB}
  .cell.dark{background:#171717}
  .cell img{height:28px}
  .cap{font:500 11px/14px var(--font-mono);color:#5C5C5C}
  .cell.dark .cap{color:#A3A3A3}
</style></head><body>
  <div class="cell light"><img src="../assets/AM-Logo-Dark.svg" alt="Airmap"><div class="cap">AM-Logo-Dark.svg · on light</div></div>
  <div class="cell dark"><img src="../assets/AM-Logo-Light.svg" alt="Airmap"><div class="cap">AM-Logo-Light.svg · on dark</div></div>
</body></html>
