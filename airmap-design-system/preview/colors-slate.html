<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:var(--surface);display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border-subtle)}
  .sw{flex:1;height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font:500 11px/14px var(--font-mono)}
  .lbl{display:flex;justify-content:space-between;font:500 12px/16px var(--font-sans);color:var(--fg-2);padding:0 2px}
</style></head><body>
  <div class="lbl"><span>Neutral · Slate</span><span>Secondary scale, used for charts & cool surfaces</span></div>
  <div class="row">
    <div class="sw" style="background:#FFFFFF;color:#0E121B;border-right:1px solid var(--border-subtle)">0</div>
    <div class="sw" style="background:#F5F7FA;color:#0E121B">50</div>
    <div class="sw" style="background:#F2F5F8;color:#0E121B">100</div>
    <div class="sw" style="background:#EAECF0;color:#0E121B">200</div>
    <div class="sw" style="background:#CACFD8;color:#0E121B">300</div>
    <div class="sw" style="background:#99A0AE;color:#0E121B">400</div>
    <div class="sw" style="background:#717784;color:#FFFFFF">500</div>
    <div class="sw" style="background:#525866;color:#FFFFFF">600</div>
    <div class="sw" style="background:#2B303B;color:#FFFFFF">700</div>
    <div class="sw" style="background:#222530;color:#FFFFFF">800</div>
    <div class="sw" style="background:#181B25;color:#FFFFFF">900</div>
    <div class="sw" style="background:#0E121B;color:#FFFFFF">950</div>
  </div>
</body></html>
