<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#F7F7F7;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;text-align:center}
  .cell{padding:10px 4px;background:#fff;border:1px solid #EBEBEB;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .cell i{font-size:22px;color:#171717;line-height:1}
  .nm{font:500 10px/12px var(--font-mono);color:#5C5C5C}
  h4{margin:0 0 10px;font:500 11px/14px var(--font-mono);color:#5C5C5C;text-transform:uppercase;letter-spacing:0.06em}
</style>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head><body>
  <h4>RemixIcon · line style · currentColor</h4>
  <div class="grid">
    <div class="cell"><i class="ri-search-line"></i><div class="nm">search</div></div>
    <div class="cell"><i class="ri-add-line"></i><div class="nm">add</div></div>
    <div class="cell"><i class="ri-close-line"></i><div class="nm">close</div></div>
    <div class="cell"><i class="ri-check-line"></i><div class="nm">check</div></div>
    <div class="cell"><i class="ri-arrow-right-s-line"></i><div class="nm">arrow-r-s</div></div>
    <div class="cell"><i class="ri-arrow-down-s-line"></i><div class="nm">arrow-d-s</div></div>
    <div class="cell"><i class="ri-arrow-left-s-line"></i><div class="nm">arrow-l-s</div></div>
    <div class="cell"><i class="ri-more-2-line"></i><div class="nm">more-2</div></div>
    <div class="cell"><i class="ri-settings-3-line"></i><div class="nm">settings-3</div></div>
    <div class="cell"><i class="ri-share-forward-line"></i><div class="nm">share-fwd</div></div>
    <div class="cell"><i class="ri-file-copy-line"></i><div class="nm">file-copy</div></div>
    <div class="cell"><i class="ri-bookmark-line"></i><div class="nm">bookmark</div></div>
    <div class="cell"><i class="ri-star-line"></i><div class="nm">star</div></div>
    <div class="cell"><i class="ri-chat-3-line"></i><div class="nm">chat-3</div></div>
    <div class="cell"><i class="ri-folder-line"></i><div class="nm">folder</div></div>
    <div class="cell"><i class="ri-user-line"></i><div class="nm">user</div></div>
    <div class="cell"><i class="ri-edit-line"></i><div class="nm">edit</div></div>
    <div class="cell"><i class="ri-delete-bin-line"></i><div class="nm">delete-bin</div></div>
    <div class="cell"><i class="ri-eye-line"></i><div class="nm">eye</div></div>
    <div class="cell"><i class="ri-information-line"></i><div class="nm">information</div></div>
    <div class="cell"><i class="ri-upload-2-line"></i><div class="nm">upload-2</div></div>
    <div class="cell"><i class="ri-download-2-line"></i><div class="nm">download-2</div></div>
    <div class="cell"><i class="ri-flashlight-fill"></i><div class="nm">flashlight-f</div></div>
    <div class="cell"><i class="ri-attachment-2"></i><div class="nm">attachment</div></div>
  </div>
</body></html>
