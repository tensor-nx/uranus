<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .tok{border:1px solid var(--border-subtle);border-radius:10px;padding:12px;display:flex;gap:12px;align-items:center}
  .sw{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-subtle);flex-shrink:0}
  .k{font:500 12px/16px var(--font-sans);color:var(--fg)}
  .v{font:500 11px/14px var(--font-mono);color:var(--fg-2)}
</style></head><body>
  <div class="grid">
    <div class="tok"><div class="sw" style="background:#F7F7F7"></div><div><div class="k">--bg</div><div class="v">#F7F7F7</div></div></div>
    <div class="tok"><div class="sw" style="background:#FFFFFF"></div><div><div class="k">--surface</div><div class="v">#FFFFFF</div></div></div>
    <div class="tok"><div class="sw" style="background:#EBEBEB"></div><div><div class="k">--surface-elevated</div><div class="v">#EBEBEB</div></div></div>
    <div class="tok"><div class="sw" style="background:#171717"></div><div><div class="k">--fg</div><div class="v">#171717</div></div></div>
    <div class="tok"><div class="sw" style="background:#5C5C5C"></div><div><div class="k">--fg-2</div><div class="v">#5C5C5C</div></div></div>
    <div class="tok"><div class="sw" style="background:#A3A3A3"></div><div><div class="k">--fg-3</div><div class="v">#A3A3A3</div></div></div>
    <div class="tok"><div class="sw" style="background:#D1D1D1"></div><div><div class="k">--border-default</div><div class="v">#D1D1D1</div></div></div>
    <div class="tok"><div class="sw" style="background:#EBEBEB"></div><div><div class="k">--border-subtle</div><div class="v">#EBEBEB</div></div></div>
    <div class="tok"><div class="sw" style="background:#171717"></div><div><div class="k">--border-strong</div><div class="v">#171717</div></div></div>
  </div>
</body></html>
