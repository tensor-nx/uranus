<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:#F7F7F7;display:flex;gap:16px;align-items:center;justify-content:center}
  .mark{display:grid;place-items:center;border-radius:12px}
  .s24{width:24px;height:24px;border-radius:6px}
  .s32{width:32px;height:32px;border-radius:8px}
  .s48{width:48px;height:48px}
  .s64{width:64px;height:64px}
  .s88{width:88px;height:88px;border-radius:18px}
  img{width:60%;height:60%}
  .s24 img{width:48%;height:48%}
  .stack{display:flex;flex-direction:column;align-items:center;gap:6px}
  .cap{font:500 11px/14px var(--font-mono);color:#5C5C5C}
</style></head><body>
  <div class="stack"><div class="mark s24" style="background:#171717"><img src="../assets/AM-Icon-Light.svg"></div><div class="cap">24</div></div>
  <div class="stack"><div class="mark s32" style="background:#171717"><img src="../assets/AM-Icon-Light.svg"></div><div class="cap">32</div></div>
  <div class="stack"><div class="mark s48" style="background:#171717"><img src="../assets/AM-Icon-Light.svg"></div><div class="cap">48</div></div>
  <div class="stack"><div class="mark s64" style="background:#171717"><img src="../assets/AM-Icon-Light.svg"></div><div class="cap">64</div></div>
  <div class="stack"><div class="mark s88" style="background:#fff;border:1px solid #EBEBEB"><img src="../assets/AM-Icon-Dark.svg"></div><div class="cap">Favicon / App</div></div>
</body></html>
