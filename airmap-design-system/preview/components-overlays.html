<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:18px;background:#F7F7F7;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#fff;border:1px solid #EBEBEB;border-radius:16px;padding:14px;position:relative}
  .lbl{font:500 11px/14px var(--font-mono);color:var(--fg-3);margin-bottom:10px}

  /* Tooltip */
  .tt{display:inline-flex;padding:6px 10px;background:#171717;color:#fff;border-radius:6px;font:500 12px/16px var(--font-sans);letter-spacing:-0.006em;position:relative}
  .tt::after{content:"";position:absolute;bottom:-4px;left:50%;transform:translateX(-50%) rotate(45deg);width:8px;height:8px;background:#171717}

  /* Popover */
  .pop{width:220px;background:#fff;border:1px solid #EBEBEB;border-radius:12px;box-shadow:0 16px 32px -12px rgba(14,18,27,0.1);padding:8px}
  .pop .it{padding:8px 10px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;font:500 13px/20px var(--font-sans);color:var(--fg);letter-spacing:-0.006em}
  .pop .it + .it{margin-top:4px}
  .pop .it:hover{background:#F5F5F5}
  .pop .it.on{background:#EBEBEB}
  .pop .it.on:hover{background:#E5E5E5}
  /* Canonical keycap */
  .pop .it kbd{
    display:inline-flex;align-items:center;gap:2px;
    height:22px;padding:0 7px;
    border:1px solid #EBEBEB;border-bottom-color:#D1D1D1;
    border-radius:6px;
    background:#F7F7F7;
    box-shadow:inset 0 -1px 0 rgba(23,23,23,0.02);
    font-family:'Geist', ui-sans-serif, system-ui, sans-serif;
    font-size:11px;line-height:1;font-weight:500;
    color:#7B7B7B;letter-spacing:0.02em;white-space:nowrap;
  }
  .pop .it kbd .cmd{font-size:12px;font-weight:500;margin-right:1px;transform:translateY(-0.5px)}
  .pop .sep{height:1px;background:#EBEBEB;margin:6px 2px}

  /* Modal preview */
  .md{background:#fff;border:1px solid #EBEBEB;border-radius:16px;box-shadow:0 16px 32px -12px rgba(14,18,27,0.12);padding:16px;display:flex;flex-direction:column;gap:10px}
  .md h4{margin:0;font:500 15px/20px var(--font-sans);color:var(--fg);letter-spacing:-0.01em}
  .md p{margin:0;font:400 13px/18px var(--font-sans);color:var(--fg-2)}
  .md .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
  .md button{height:32px;padding:0 12px;border-radius:8px;font:500 13px/16px var(--font-sans);border:1px solid;cursor:pointer}
  .md .st{background:#fff;color:#171717;border-color:#D1D1D1}
  .md .fl{background:#171717;color:#fff;border-color:#171717}

  /* Drawer peek */
  .dr{display:flex;height:120px;background:#EBEBEB;border-radius:12px;overflow:hidden;position:relative}
  .dr .sheet{margin-left:auto;width:58%;background:#fff;border-left:1px solid #EBEBEB;padding:12px;display:flex;flex-direction:column;gap:6px;box-shadow:-16px 0 32px -12px rgba(14,18,27,0.08)}
  .dr .sheet h5{margin:0;font:500 13px/16px var(--font-sans);color:var(--fg)}
  .dr .sheet p{margin:0;font:400 12px/16px var(--font-sans);color:var(--fg-2)}
</style></head><body>
  <div class="card">
    <div class="lbl">TOOLTIP</div>
    <div style="padding:16px 0;display:flex;justify-content:center"><span class="tt">Promote draft to deliverable</span></div>
  </div>
  <div class="card">
    <div class="lbl">POPOVER · MENU</div>
    <div class="pop">
      <div class="it on">Rename<kbd>R</kbd></div>
      <div class="it">Duplicate<kbd><span class="cmd">⌘</span>D</kbd></div>
      <div class="it">Share</div>
      <div class="sep"></div>
      <div class="it" style="color:#FB3748">Delete</div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">MODAL</div>
    <div class="md">
      <h4>Delete this map?</h4>
      <p>Drafts and pinned notes will be archived. You can restore within 30 days.</p>
      <div class="actions"><button class="st">Cancel</button><button class="fl">Delete</button></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">DRAWER</div>
    <div class="dr"><div class="sheet"><h5>Share map</h5><p>Invite people or copy a link. Permissions apply to all drafts.</p></div></div>
  </div>
</body></html>
