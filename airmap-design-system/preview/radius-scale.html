<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:22px 18px;background:var(--surface);font-family:var(--font-sans)}
  .row{display:flex;gap:14px;align-items:flex-end;justify-content:space-between}
  .tok{display:flex;flex-direction:column;align-items:center;gap:8px}
  .sq{width:56px;height:56px;background:var(--gray-100);border:1px solid var(--border-default)}
  .meta{font:500 11px/14px var(--font-mono);color:var(--fg-2);text-align:center}
  .name{font:500 11px/14px var(--font-sans);color:var(--fg);letter-spacing:-0.006em}
</style></head><body>
  <div class="row">
    <div class="tok"><div class="sq" style="border-radius:4px"></div><div class="meta"><div class="name">4</div>tag</div></div>
    <div class="tok"><div class="sq" style="border-radius:6px"></div><div class="meta"><div class="name">6</div>chip</div></div>
    <div class="tok"><div class="sq" style="border-radius:8px"></div><div class="meta"><div class="name">8</div>nav item</div></div>
    <div class="tok"><div class="sq" style="border-radius:10px"></div><div class="meta"><div class="name">10</div>button</div></div>
    <div class="tok"><div class="sq" style="border-radius:12px"></div><div class="meta"><div class="name">12</div>card</div></div>
    <div class="tok"><div class="sq" style="border-radius:16px"></div><div class="meta"><div class="name">16</div>modal</div></div>
    <div class="tok"><div class="sq" style="border-radius:20px"></div><div class="meta"><div class="name">20</div>sheet</div></div>
    <div class="tok"><div class="sq" style="border-radius:24px"></div><div class="meta"><div class="name">24</div>panel</div></div>
    <div class="tok"><div class="sq" style="border-radius:9999px"></div><div class="meta"><div class="name">full</div>pill · avatar</div></div>
  </div>
</body></html>
