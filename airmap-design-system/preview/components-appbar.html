<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:0;background:#F7F7F7;font-family:var(--font-sans)}
  .ab{height:44px;border-bottom:1px solid #EBEBEB;background:rgba(247,247,247,0.85);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;padding:0 16px}
  .ab img{height:18px}
  .sep{width:1px;height:16px;background:#EBEBEB}
  .crumb{font:400 13px/18px var(--font-sans);color:#7B7B7B}
  .crumb b{color:#171717;font-weight:500}
  .push{margin-left:auto;display:flex;gap:8px}
  .ic{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:#5C5C5C;cursor:pointer}
  .ic:hover{background:#EBEBEB}
  svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .av{width:24px;height:24px;border-radius:9999px;background:#171717;color:#fff;font:500 10px/24px var(--font-sans);text-align:center}
</style></head><body>
  <div class="ab">
    <img src="../assets/AM-Icon-Dark.svg" alt="">
    <div class="sep"></div>
    <div class="crumb">Acme · <b>Q3 positioning</b></div>
    <div class="push">
      <div class="ic"><svg viewBox="0 0 24 24"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="8"/></svg></div>
      <div class="ic"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      <div class="av">KR</div>
    </div>
  </div>
</body></html>
