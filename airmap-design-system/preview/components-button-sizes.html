<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root{
    --ink:#171717;
    --gray-500:#7B7B7B;
    --gray-400:#A3A3A3;
  }
  *{box-sizing:border-box}
  body{
    margin:0;padding:22px;background:#F7F7F7;
    font-family:var(--font-sans,'Geist',sans-serif);color:var(--ink);
    -webkit-font-smoothing:antialiased;letter-spacing:-0.006em;
    display:flex;flex-direction:column;gap:14px;
  }
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .lbl{
    width:96px;flex-shrink:0;
    font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:10px;line-height:14px;font-weight:500;
    color:var(--gray-400);letter-spacing:0.04em;text-transform:uppercase;
  }

  button{
    font-family:var(--font-sans);font-weight:500;letter-spacing:-0.006em;
    background:var(--ink);color:#fff;border:1px solid var(--ink);
    cursor:pointer;display:inline-flex;align-items:center;
    box-shadow:0 1px 0 rgba(23,23,23,0.04), inset 0 1px 0 rgba(255,255,255,0.06);
    transition:background .12s;
  }
  button:hover{background:#000}

  /*
    Scale stepped down one notch:
    xs 28→24, sm 32→28, md 40→32, lg 48→40, xl 56→48
    Padding is asymmetric when a leading icon is present (-2px left)
    to optically center the text+icon pair against the button's center axis.
    gap is 6px (was 4) — gives the icon its own clear space.
  */
  .xs{height:24px;padding:0 9px;font-size:12px;line-height:1;border-radius:6px;gap:5px}
  .sm{height:28px;padding:0 11px;font-size:12px;line-height:1;border-radius:6px;gap:5px}
  .md{height:32px;padding:0 12px;font-size:13px;line-height:1;border-radius:7px;gap:6px}
  .lg{height:40px;padding:0 16px;font-size:14px;line-height:1;border-radius:8px;gap:6px}
  .xl{height:48px;padding:0 20px;font-size:15px;line-height:1;border-radius:10px;gap:7px}

  /* Leading-icon buttons — shrink left padding slightly so the icon+label optically centers */
  .has-icon.xs{padding-left:7px}
  .has-icon.sm{padding-left:9px}
  .has-icon.md{padding-left:10px}
  .has-icon.lg{padding-left:13px}
  .has-icon.xl{padding-left:16px}

  /* Icon sizing per button size */
  .ic{flex-shrink:0;display:block}
  .xs .ic, .sm .ic{width:12px;height:12px}
  .md .ic{width:13px;height:13px}
  .lg .ic{width:14px;height:14px}
  .xl .ic{width:15px;height:15px}

  /* Stroke plus that looks centered & clean */
  .ic path{stroke-linecap:round}
</style></head>
<body>
  <div class="row">
    <div class="lbl">X-Small · 24</div>
    <button class="xs">Button</button>
    <button class="xs has-icon">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 3.5v9M3.5 8h9"/></svg>
      Add
    </button>
  </div>

  <div class="row">
    <div class="lbl">Small · 28</div>
    <button class="sm">Button</button>
    <button class="sm">Promote</button>
  </div>

  <div class="row">
    <div class="lbl">Medium · 32</div>
    <button class="md">Button</button>
    <button class="md">Promote draft</button>
  </div>

  <div class="row">
    <div class="lbl">Large · 40</div>
    <button class="lg">Button</button>
    <button class="lg">Continue</button>
  </div>

  <div class="row">
    <div class="lbl">X-Large · 48</div>
    <button class="xl">Get started</button>
  </div>
</body></html>
