<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:var(--surface);display:grid;grid-template-columns:1fr 1fr;gap:12px 32px}
  .row{display:flex;gap:16px;align-items:baseline;border-bottom:1px solid var(--border-subtle);padding-bottom:8px}
  .label{width:90px;font:500 11px/14px var(--font-mono);color:var(--fg-2);flex-shrink:0}
  .spec{color:var(--fg)}
  h4{margin:0 0 2px;font:500 12px/16px var(--font-sans);color:var(--fg-2);grid-column:1/-1;text-transform:uppercase;letter-spacing:0.06em}
</style></head><body>
  <h4>Labels</h4>
  <div class="row"><div class="label">XL · 24</div><div class="spec label-x-large">Label XL</div></div>
  <div class="row"><div class="label">L · 18</div><div class="spec label-large">Label large</div></div>
  <div class="row"><div class="label">M · 16</div><div class="spec label-medium">Label medium</div></div>
  <div class="row"><div class="label">S · 14</div><div class="spec label-small">Label small</div></div>
  <div class="row"><div class="label">Compact · 13</div><div class="spec label-compact">Label compact</div></div>
  <div class="row"><div class="label">XS · 12</div><div class="spec label-x-small">Label x-small</div></div>
</body></html>
