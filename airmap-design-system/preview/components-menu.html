<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#F7F7F7;font-family:var(--font-sans)}
  .menu{background:#fff;border:1px solid #EBEBEB;border-radius:12px;box-shadow:0 8px 16px rgba(23,23,23,0.08);padding:6px;min-width:220px;display:flex;flex-direction:column;gap:4px}
  .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;font:500 14px/20px var(--font-sans);color:#171717;cursor:pointer;letter-spacing:-0.006em}

  /* Canonical keycap — matches design-system spec */
  .kbd{

    color:#7B7B7B;letter-spacing:0.02em;white-space:nowrap;margin-left:auto;
  }
  .kbd .cmd{font-size:12px;font-weight:500;margin-right:1px;transform:translateY(-0.5px)}
  .sep{height:1px;background:#EBEBEB;margin:2px 0}
  svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
