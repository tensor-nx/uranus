<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root{
    --ink:#171717;
    --gray-500:#7B7B7B;
    --gray-400:#A3A3A3;
    --gray-300:#D1D1D1;
    --gray-200:#EBEBEB;
    --gray-100:#F5F5F5;
    --gray-50:#F7F7F7;
  }
  *{box-sizing:border-box}
  body{
    margin:0;padding:22px;background:#F7F7F7;
    font-family:var(--font-sans,'Geist',sans-serif);color:var(--ink);
    -webkit-font-smoothing:antialiased;letter-spacing:-0.006em;
    display:flex;flex-direction:column;gap:12px;
  }
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .lbl{
    width:88px;flex-shrink:0;
    font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:10px;line-height:14px;font-weight:500;
    color:var(--gray-400);letter-spacing:0.04em;text-transform:uppercase;
  }

  /* Medium button — 32px height (was 40) */
  button{
    height:32px;padding:0 12px;gap:6px;
    font-family:var(--font-sans);font-weight:500;font-size:13px;line-height:1;letter-spacing:-0.006em;
    border:1px solid transparent;border-radius:7px;cursor:pointer;
    display:inline-flex;align-items:center;
    transition:background .12s, border-color .12s, color .12s;
  }
  /* Asymmetric padding when a leading/trailing icon is present */
  button.has-lead{padding-left:10px}
  button.has-trail{padding-right:10px}

  /* Filled: primary CTA */
  .filled{background:var(--ink);color:#fff;border-color:var(--ink);
    box-shadow:0 1px 0 rgba(23,23,23,0.04), inset 0 1px 0 rgba(255,255,255,0.06)}
  .filled:hover{background:#000}

  /* Stroke: outline */
  .stroke{background:#fff;color:var(--ink);border-color:var(--gray-300);
    box-shadow:0 1px 0 rgba(23,23,23,0.02)}
  .stroke:hover{background:var(--gray-50);border-color:var(--gray-400)}

  /* Lighter: 6% alpha black fill */
  .lighter{background:rgba(23,23,23,0.05);color:var(--ink);border-color:transparent}
  .lighter:hover{background:rgba(23,23,23,0.09)}

  /* Ghost — very subtle tint at rest so it reads as a button; darker on hover */
  .ghost{background:var(--gray-50);color:var(--ink);border-color:transparent}
  .ghost:hover{background:var(--gray-200)}

  /* Destructive */
  .destructive{background:#FB3748;color:#fff;border-color:#FB3748;
    box-shadow:0 1px 0 rgba(251,55,72,0.08), inset 0 1px 0 rgba(255,255,255,0.10)}
  .destructive:hover{background:#e62e3d;border-color:#e62e3d}

  /* Disabled */
  .disabled{background:var(--gray-100)!important;color:var(--gray-300)!important;border-color:var(--gray-200)!important;
    cursor:not-allowed!important;box-shadow:none!important}

  /* Icons — 13px at 32px button size */
  .ic{width:13px;height:13px;flex-shrink:0;display:block}
  .ic path{stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
  <div class="row">
    <div class="lbl">Filled</div>
    <button class="filled has-lead">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 3.5v9M3.5 8h9"/></svg>
      New map
    </button>
    <button class="filled">Promote to deliverable</button>
    <button class="filled disabled">Disabled</button>
  </div>

  <div class="row">
    <div class="lbl">Stroke</div>
    <button class="stroke">Cancel</button>
    <button class="stroke">Share</button>
    <button class="stroke has-trail">
      Export
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3.5 8h8.5M9 4.5 12.5 8 9 11.5"/></svg>
    </button>
  </div>

  <div class="row">
    <div class="lbl">Lighter</div>
    <button class="lighter">Filter</button>
    <button class="lighter has-lead">
      <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 3.5v9M3.5 8h9"/></svg>
      Add source
    </button>
    <button class="lighter disabled">Disabled</button>
  </div>

  <div class="row">
    <div class="lbl">Ghost</div>
    <button class="ghost">Dismiss</button>
    <button class="ghost">View history</button>
  </div>

  <div class="row">
    <div class="lbl">Destructive</div>
    <button class="destructive">Delete map</button>
  </div>
</body></html>
