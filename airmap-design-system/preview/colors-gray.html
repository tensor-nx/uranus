<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:var(--surface);display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border-subtle)}
  .sw{flex:1;height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font:500 11px/14px var(--font-mono)}
  .lbl{display:flex;justify-content:space-between;font:500 12px/16px var(--font-sans);color:var(--fg-2);padding:0 2px}
</style></head><body>
  <div class="lbl"><span>Neutral · Gray</span><span>12 steps — the primary palette</span></div>
  <div class="row">
    <div class="sw" style="background:#FFFFFF;color:#171717;border-right:1px solid var(--border-subtle)">0</div>
    <div class="sw" style="background:#F7F7F7;color:#171717">50</div>
    <div class="sw" style="background:#F5F5F5;color:#171717">100</div>
    <div class="sw" style="background:#EBEBEB;color:#171717">200</div>
    <div class="sw" style="background:#D1D1D1;color:#171717">300</div>
    <div class="sw" style="background:#A3A3A3;color:#171717">400</div>
    <div class="sw" style="background:#7B7B7B;color:#FFFFFF">500</div>
    <div class="sw" style="background:#5C5C5C;color:#FFFFFF">600</div>
    <div class="sw" style="background:#333333;color:#FFFFFF">700</div>
    <div class="sw" style="background:#262626;color:#FFFFFF">800</div>
    <div class="sw" style="background:#1C1C1C;color:#FFFFFF">900</div>
    <div class="sw" style="background:#171717;color:#FFFFFF">950</div>
  </div>
</body></html>
