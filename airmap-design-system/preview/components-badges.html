<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--surface,#F7F7F7);display:flex;flex-wrap:wrap;gap:8px;font-family:var(--font-sans, 'Geist', sans-serif)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:9999px;font-size:12px;line-height:16px;font-weight:500;font-family:'Geist', ui-sans-serif, system-ui, sans-serif;letter-spacing:-0.006em}
  .tag{
    display:inline-flex;align-items:center;gap:6px;
    padding:3px 8px;border-radius:4px;
    font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight:500;font-size:11px;line-height:14px;letter-spacing:0.02em;
    font-variant-ligatures:none;
    border:1px solid;
  }
  .dot{width:6px;height:6px;border-radius:9999px}
</style></head><body>
  <span class="badge" style="background:#171717;color:#fff">Promoted</span>
  <span class="badge" style="background:#EBEBEB;color:#171717">Draft</span>
  <span class="badge" style="background:#fff;color:#171717;border:1px solid #D1D1D1">v12</span>
  <span class="badge" style="background:#E3F7EC;color:#0B4627"><span class="dot" style="background:#1DAF61"></span>Up to date</span>
  <span class="badge" style="background:#FFFAEB;color:#624C18"><span class="dot" style="background:#F6B51E"></span>Needs review</span>
  <span class="badge" style="background:#FFEBEC;color:#681219"><span class="dot" style="background:#FB3748"></span>Out of sync</span>
  <span class="tag" style="background:#F5F5F5;color:#5C5C5C;border-color:#EBEBEB">POSITIONING</span>
  <span class="tag" style="background:#F5F5F5;color:#5C5C5C;border-color:#EBEBEB">Q3-2026</span>
  <span class="tag" style="background:#F5F5F5;color:#5C5C5C;border-color:#EBEBEB">STRATEGY</span>
</body></html>
